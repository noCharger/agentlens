name: Bug Report
description: Something isn't working as expected
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill in as much detail as you can.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: When I run `python -m agentlens.eval --scenario-id tc-001`, ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      placeholder: I expected the scenario to pass / the output to contain ...
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the issue.
      placeholder: |
        1. Create a scenario with `...`
        2. Run `python -m agentlens.eval ...`
        3. See error
    validations:
      required: true

  - type: textarea
    id: error
    attributes:
      label: Error output
      description: Paste the full error message or traceback.
      render: text

  - type: dropdown
    id: provider
    attributes:
      label: Model provider
      options:
        - Gemini
        - DeepSeek
        - OpenRouter
        - Zhipu
        - Other / not applicable
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: AgentLens version
      description: Output of `pip show agentlens | grep Version`
      placeholder: "0.1.0"
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      description: Output of `python --version`
      placeholder: "3.11.9"
    validations:
      required: true
